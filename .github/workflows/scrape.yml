name: Scrape Flights

on:
  schedule:
    - cron: '0 12 * * *' # Once daily at 12:00 UTC (6am MT)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape flights
        env:
          MYIDTRAVEL_COMPANY: ${{ secrets.MYIDTRAVEL_COMPANY }}
          MYIDTRAVEL_USERNAME: ${{ secrets.MYIDTRAVEL_USERNAME }}
          MYIDTRAVEL_PASSWORD: ${{ secrets.MYIDTRAVEL_PASSWORD }}
        run: node scrape.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/flights.json
          git diff --staged --quiet || git commit -m "Update flight data $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push
